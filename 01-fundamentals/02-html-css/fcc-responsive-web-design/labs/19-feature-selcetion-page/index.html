<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Selection Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Feature Selection</h1>
    <div class="feature-card-container">
        <label for="cloud-storage" class="feature-card">
            <input type="checkbox" id="cloud-storage" name="cloud-storage">
            <h2>Cloud Storage</h2>
            <p>100 Gigabyte secure storage</p>
        </label>
        <label for="dedicated-support" class="feature-card">
            <input type="checkbox" id="dedicated-support" name="dedicated-support">
            <h2>Dedicated Support</h2>
            <p>24/7 customer help</p>
            
        </label>
        <label for="advanced-analytics" class="feature-card">
            <input type="checkbox" id="advanced-analytics" name="advanced-analytics">
            <h2>Advanced Analytics</h2>
            <p>Insights & reports</p>

        </label>
        <label for="custom-user-themes" class="feature-card">
            <input type="checkbox" id="custom-user-themes" name="custom-user-themes">
            <h2>Custom User Themes</h2>
            <p>Personalized dashboard design</p>
        </label>
    </div>
</body>
</html>
