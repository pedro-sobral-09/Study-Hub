<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Job Application Form</h1>
        <form>
            <label for="name">Full Name: </label>
            <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            
            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>

            <label for="position">Position: </label>
            <select name="position" id="position" required> 
                <option value="">Select a position</option>
                <option value="frontend">Developer</option>
                <option value="backend">Designer</option>
                <option value="fullstack">Manager</option>
            </select>

            <fieldset class="radio-group">
                <legend>Availability:</legend>
                <input type="radio" name="availability" id="full-time" checked>
                <label for="full-time">Full Time</label>
                <input type="radio" name="availability" id="part-time">
                <label for="part-time">Part Time</label>
            </fieldset>

            <label for="message">Why do you want this job?</label>
            <textarea name="message" id="message" placeholder="Enter your message here..." required></textarea>
            <button type="submit">Submit Application</button>
        </form>
    </div>
</body>
</html>
