<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="playing-cards">
        <div class="card">
            <div class="left"><p>A</p> <p>♠</p></div>
            <div class="middle"><p>♠</p></div>
            <div class="right"><p>A</p> <p>♠</p></div>
        </div>
        <div class="card">
            <div class="left"><p>2</p> <p>♣</p></div>
            <div class="middle"><p>♣</p> <p>♣</p></div>
            <div class="right"><p>2</p> <p>♣</p></div>
        </div>
        <div class="card red">
            <div class="left">3 <br> ♥</div>
            <div class="middle">♥ <br>♥ <br> ♥</div>
            <div class="right">3 <br> ♥</div>
        </div>
    </main>
</body>
</html>
